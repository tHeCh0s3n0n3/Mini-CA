services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    ports:
      - "8081:80"
    volumes:
      - mini-ca-data:/app/data
      - ./secrets:/app/secrets:ro
      - ./logs/backend:/app/logs
      - ./asp-keys/backend:/app/asp-keys
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - mini-ca-data:/app/data
      - ./secrets:/app/secrets:ro
      - ./logs/frontend:/app/logs
      - ./asp-keys/frontend:/app/asp-keys
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mini-ca-data:
